name: althea-ci

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Althea-main/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements.txt
      - run: python -m pip install pytest
      - run: python -m py_compile main.py
      - run: python -m pytest
      - run: docker build -f Dockerfile ..

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Althea-main/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Althea-main/frontend/package-lock.json
      - run: npm ci
      - run: npm run build
