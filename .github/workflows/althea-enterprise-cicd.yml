name: althea-enterprise-cicd

on:
  push:
    branches: ["main", "staging", "develop"]
    tags: ["v*.*.*"]
  pull_request:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/althea-backend

permissions:
  contents: read

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend deps
        run: pip install -r backend/requirements.txt
      - name: Compile backend
        run: cd backend && python -m compileall . -x "(\.venv|__pycache__)"
      - name: Run backend tests
        env:
          ALTHEA_JWT_SECRET: ci-test-secret-ci-test-secret-ci
          ALTHEA_REFRESH_COOKIE_SECURE: "false"
        run: pytest backend/tests -q
      - name: Validate backend image build
        run: docker build -f backend/Dockerfile .

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run test -- --run
      - run: npm run build
      - run: docker build -f Dockerfile ..

  deployment-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-kubectl@v4
      - name: Validate docker compose definitions
        run: |
          docker compose -f docker/docker-compose.dev.yml config -q
          docker compose -f docker/docker-compose.staging.yml config -q
          docker compose -f docker/docker-compose.prod.yml config -q
      - name: Validate Kubernetes overlays
        run: |
          kubectl kustomize k8s/base >/dev/null
          kubectl kustomize k8s/overlays/dev >/dev/null
          kubectl kustomize k8s/overlays/staging >/dev/null
          kubectl kustomize k8s/overlays/prod >/dev/null

  build-and-push:
    needs: [backend-test, frontend-build, deployment-config]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Derive image tag
        id: meta
        run: |
          SHORT_SHA="${GITHUB_SHA::12}"
          echo "tag=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  deploy-dev:
    needs: [build-and-push]
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4
      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
      - name: Deploy dev overlay
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG_B64 }}
        run: |
          echo "$KUBECONFIG_B64" | base64 -d > "$HOME/.kube/config"
          kubectl apply -k k8s/overlays/dev
          kubectl apply -k k8s/observability

  deploy-staging:
    needs: [build-and-push]
    if: github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
      - name: Deploy staging overlay
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG_B64 }}
        run: |
          echo "$KUBECONFIG_B64" | base64 -d > "$HOME/.kube/config"
          kubectl apply -k k8s/overlays/staging
          kubectl apply -k k8s/observability

  deploy-prod:
    needs: [build-and-push]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
      - name: Deploy prod overlay
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG_B64 }}
        run: |
          echo "$KUBECONFIG_B64" | base64 -d > "$HOME/.kube/config"
          kubectl apply -k k8s/overlays/prod
          kubectl apply -k k8s/observability
