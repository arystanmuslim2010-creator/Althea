apiVersion: apps/v1
kind: Deployment
metadata:
  name: althea-prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: althea-prometheus
  template:
    metadata:
      labels:
        app: althea-prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.53.0
          args:
            - --config.file=/etc/prometheus/prometheus.yml
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
      volumes:
        - name: config
          configMap:
            name: althea-prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: althea-prometheus
spec:
  selector:
    app: althea-prometheus
  ports:
    - name: http
      port: 9090
      targetPort: 9090
