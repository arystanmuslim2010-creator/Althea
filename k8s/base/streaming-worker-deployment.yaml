apiVersion: apps/v1
kind: Deployment
metadata:
  name: althea-streaming-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: althea-streaming-worker
  template:
    metadata:
      labels:
        app: althea-streaming-worker
    spec:
      serviceAccountName: althea-runtime
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: streaming-worker
          image: ghcr.io/your-org/althea-backend:latest
          imagePullPolicy: IfNotPresent
          command:
            - python
            - -m
            - workers.streaming_worker
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          envFrom:
            - configMapRef:
                name: althea-config
          env:
            - name: ALTHEA_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: althea-secrets
                  key: database-url
            - name: ALTHEA_REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: althea-secrets
                  key: redis-url
            - name: ALTHEA_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: althea-secrets
                  key: jwt-secret
            - name: ALTHEA_STREAMING_PROVIDER
              value: redis
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
