apiVersion: apps/v1
kind: Deployment
metadata:
  name: althea-streaming-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: althea-streaming-worker
  template:
    metadata:
      labels:
        app: althea-streaming-worker
    spec:
      containers:
        - name: streaming-worker
          image: ghcr.io/your-org/althea-backend:latest
          command:
            - python
            - -m
            - workers.streaming_worker
          envFrom:
            - configMapRef:
                name: althea-config
          env:
            - name: ALTHEA_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: althea-secrets
                  key: database-url
            - name: ALTHEA_REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: althea-secrets
                  key: redis-url
            - name: ALTHEA_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: althea-secrets
                  key: jwt-secret
            - name: ALTHEA_STREAMING_PROVIDER
              value: redis
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
