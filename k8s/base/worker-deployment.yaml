apiVersion: apps/v1
kind: Deployment
metadata:
  name: althea-worker
spec:
  replicas: 4
  selector:
    matchLabels:
      app: althea-worker
  template:
    metadata:
      labels:
        app: althea-worker
    spec:
      containers:
        - name: worker
          image: ghcr.io/your-org/althea-backend:latest
          command:
            - python
            - -m
            - workers.pipeline_worker
          envFrom:
            - configMapRef:
                name: althea-config
          env:
            - name: ALTHEA_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: althea-secrets
                  key: database-url
            - name: ALTHEA_REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: althea-secrets
                  key: redis-url
            - name: ALTHEA_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: althea-secrets
                  key: jwt-secret
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
