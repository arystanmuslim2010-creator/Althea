apiVersion: apps/v1
kind: Deployment
metadata:
  name: althea-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: althea-backend
  template:
    metadata:
      labels:
        app: althea-backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/your-org/althea-backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: althea-config
          env:
            - name: ALTHEA_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: althea-secrets
                  key: database-url
            - name: ALTHEA_REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: althea-secrets
                  key: redis-url
            - name: ALTHEA_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: althea-secrets
                  key: jwt-secret
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 8
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
