services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-althea}
      POSTGRES_USER: ${POSTGRES_USER:-althea}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set_POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-althea} -d ${POSTGRES_DB:-althea}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      ALTHEA_ENV: development
      ALTHEA_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-althea}:${POSTGRES_PASSWORD:?set_POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-althea}
      ALTHEA_REDIS_URL: redis://redis:6379/0
      ALTHEA_QUEUE_MODE: rq
      ALTHEA_JWT_SECRET: ${ALTHEA_JWT_SECRET:?set_ALTHEA_JWT_SECRET}
      ALTHEA_ENABLE_PUBLIC_TENANT_BOOTSTRAP: ${ALTHEA_ENABLE_PUBLIC_TENANT_BOOTSTRAP:-false}
      ALTHEA_BOOTSTRAP_PROVISIONING_SECRET: ${ALTHEA_BOOTSTRAP_PROVISIONING_SECRET:-}
      ALTHEA_ALLOW_SQLITE_IN_DEV: "false"
      ALTHEA_REQUIRE_POSTGRES: "true"
      ALTHEA_ENABLE_ALERT_JSONL_INGESTION: "true"
      ALTHEA_ENABLE_LEGACY_INGESTION: "false"
      ALTHEA_ENABLE_IBM_AMLSIM_IMPORT: "false"
      ALTHEA_ENABLE_HUMAN_INTERPRETATION: "true"
      ALTHEA_STRICT_INGESTION_VALIDATION: "false"
      # Alert JSONL safety cap; tune only after validating API/worker memory and proxy limits.
      # If increased, align reverse-proxy upload size/timeouts before promoting rollout.
      ALTHEA_ALERT_JSONL_MAX_UPLOAD_ROWS: "1000"
      ALTHEA_INGESTION_MAX_UPLOAD_BYTES: "10485760"
      ALTHEA_PRIMARY_INGESTION_MODE: "alert_jsonl"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - althea_data:/app/data
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  worker:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    command: python -m workers.pipeline_worker
    restart: unless-stopped
    environment:
      ALTHEA_ENV: development
      ALTHEA_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-althea}:${POSTGRES_PASSWORD:?set_POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-althea}
      ALTHEA_REDIS_URL: redis://redis:6379/0
      ALTHEA_QUEUE_MODE: rq
      ALTHEA_JWT_SECRET: ${ALTHEA_JWT_SECRET:?set_ALTHEA_JWT_SECRET}
      ALTHEA_ENABLE_ALERT_JSONL_INGESTION: "true"
      ALTHEA_ENABLE_LEGACY_INGESTION: "false"
      ALTHEA_ENABLE_IBM_AMLSIM_IMPORT: "false"
      ALTHEA_ENABLE_HUMAN_INTERPRETATION: "true"
      ALTHEA_STRICT_INGESTION_VALIDATION: "false"
      ALTHEA_ALERT_JSONL_MAX_UPLOAD_ROWS: "1000"
      ALTHEA_INGESTION_MAX_UPLOAD_BYTES: "10485760"
      ALTHEA_PRIMARY_INGESTION_MODE: "alert_jsonl"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - althea_data:/app/data
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp

  event-worker:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    command: python -m workers.event_worker
    restart: unless-stopped
    environment:
      ALTHEA_ENV: development
      ALTHEA_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-althea}:${POSTGRES_PASSWORD:?set_POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-althea}
      ALTHEA_REDIS_URL: redis://redis:6379/0
      ALTHEA_QUEUE_MODE: rq
      ALTHEA_JWT_SECRET: ${ALTHEA_JWT_SECRET:?set_ALTHEA_JWT_SECRET}
      ALTHEA_ENABLE_ALERT_JSONL_INGESTION: "true"
      ALTHEA_ENABLE_LEGACY_INGESTION: "false"
      ALTHEA_ENABLE_IBM_AMLSIM_IMPORT: "false"
      ALTHEA_ENABLE_HUMAN_INTERPRETATION: "true"
      ALTHEA_STRICT_INGESTION_VALIDATION: "false"
      ALTHEA_ALERT_JSONL_MAX_UPLOAD_ROWS: "1000"
      ALTHEA_INGESTION_MAX_UPLOAD_BYTES: "10485760"
      ALTHEA_PRIMARY_INGESTION_MODE: "alert_jsonl"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - althea_data:/app/data
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:8080"
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp

volumes:
  postgres_data:
  althea_data:
