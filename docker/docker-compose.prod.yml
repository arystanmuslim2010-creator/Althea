services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?set_POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER:?set_POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set_POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    environment:
      ALTHEA_ENV: production
      ALTHEA_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      ALTHEA_REDIS_URL: redis://redis:6379/0
      ALTHEA_QUEUE_MODE: rq
      ALTHEA_JWT_SECRET: ${ALTHEA_JWT_SECRET:?set_ALTHEA_JWT_SECRET}
      ALTHEA_ALLOWED_ORIGINS: ${ALTHEA_ALLOWED_ORIGINS:?set_ALTHEA_ALLOWED_ORIGINS}
      ALTHEA_ALLOWED_HOSTS: ${ALTHEA_ALLOWED_HOSTS:?set_ALTHEA_ALLOWED_HOSTS}
      ALTHEA_TRUST_PROXY_HEADERS: ${ALTHEA_TRUST_PROXY_HEADERS:-true}
      ALTHEA_REFRESH_COOKIE_SECURE: "true"
      ALTHEA_REFRESH_COOKIE_SAMESITE: "strict"
      ALTHEA_ALLOW_REFRESH_TOKEN_IN_BODY: "false"
      ALTHEA_EXPOSE_REFRESH_TOKEN_IN_RESPONSE: "false"
      ALTHEA_ENABLE_PUBLIC_TENANT_BOOTSTRAP: "false"
      ALTHEA_ALLOW_SQLITE_IN_DEV: "false"
      ALTHEA_REQUIRE_POSTGRES: "true"
      ALTHEA_WORKER_CONCURRENCY: ${ALTHEA_WORKER_CONCURRENCY:-8}
      ALTHEA_PIPELINE_BATCH_SIZE: ${ALTHEA_PIPELINE_BATCH_SIZE:-50000}
      ALTHEA_ENABLE_ALERT_JSONL_INGESTION: "true"
      ALTHEA_ENABLE_LEGACY_INGESTION: "false"
      ALTHEA_ENABLE_IBM_AMLSIM_IMPORT: "false"
      ALTHEA_ENABLE_HUMAN_INTERPRETATION: "true"
      ALTHEA_STRICT_INGESTION_VALIDATION: "false"
      # Alert JSONL safety cap; if raised, align ingress/proxy upload size and timeout settings first.
      ALTHEA_ALERT_JSONL_MAX_UPLOAD_ROWS: "1000"
      ALTHEA_INGESTION_MAX_UPLOAD_BYTES: "10485760"
      ALTHEA_PRIMARY_INGESTION_MODE: "alert_jsonl"
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    command: python -m workers.pipeline_worker
    environment:
      ALTHEA_ENV: production
      ALTHEA_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      ALTHEA_REDIS_URL: redis://redis:6379/0
      ALTHEA_QUEUE_MODE: rq
      ALTHEA_JWT_SECRET: ${ALTHEA_JWT_SECRET:?set_ALTHEA_JWT_SECRET}
      ALTHEA_ALLOWED_ORIGINS: ${ALTHEA_ALLOWED_ORIGINS:?set_ALTHEA_ALLOWED_ORIGINS}
      ALTHEA_ALLOWED_HOSTS: ${ALTHEA_ALLOWED_HOSTS:?set_ALTHEA_ALLOWED_HOSTS}
      ALTHEA_TRUST_PROXY_HEADERS: ${ALTHEA_TRUST_PROXY_HEADERS:-true}
      ALTHEA_REFRESH_COOKIE_SECURE: "true"
      ALTHEA_REFRESH_COOKIE_SAMESITE: "strict"
      ALTHEA_ALLOW_REFRESH_TOKEN_IN_BODY: "false"
      ALTHEA_EXPOSE_REFRESH_TOKEN_IN_RESPONSE: "false"
      ALTHEA_ENABLE_PUBLIC_TENANT_BOOTSTRAP: "false"
      ALTHEA_WORKER_CONCURRENCY: ${ALTHEA_WORKER_CONCURRENCY:-8}
      ALTHEA_ENABLE_ALERT_JSONL_INGESTION: "true"
      ALTHEA_ENABLE_LEGACY_INGESTION: "false"
      ALTHEA_ENABLE_IBM_AMLSIM_IMPORT: "false"
      ALTHEA_ENABLE_HUMAN_INTERPRETATION: "true"
      ALTHEA_STRICT_INGESTION_VALIDATION: "false"
      ALTHEA_ALERT_JSONL_MAX_UPLOAD_ROWS: "1000"
      ALTHEA_INGESTION_MAX_UPLOAD_BYTES: "10485760"
      ALTHEA_PRIMARY_INGESTION_MODE: "alert_jsonl"
    depends_on:
      - postgres
      - redis

  event-worker:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    command: python -m workers.event_worker
    environment:
      ALTHEA_ENV: production
      ALTHEA_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      ALTHEA_REDIS_URL: redis://redis:6379/0
      ALTHEA_QUEUE_MODE: rq
      ALTHEA_JWT_SECRET: ${ALTHEA_JWT_SECRET:?set_ALTHEA_JWT_SECRET}
      ALTHEA_ALLOWED_ORIGINS: ${ALTHEA_ALLOWED_ORIGINS:?set_ALTHEA_ALLOWED_ORIGINS}
      ALTHEA_ALLOWED_HOSTS: ${ALTHEA_ALLOWED_HOSTS:?set_ALTHEA_ALLOWED_HOSTS}
      ALTHEA_TRUST_PROXY_HEADERS: ${ALTHEA_TRUST_PROXY_HEADERS:-true}
      ALTHEA_REFRESH_COOKIE_SECURE: "true"
      ALTHEA_REFRESH_COOKIE_SAMESITE: "strict"
      ALTHEA_ALLOW_REFRESH_TOKEN_IN_BODY: "false"
      ALTHEA_EXPOSE_REFRESH_TOKEN_IN_RESPONSE: "false"
      ALTHEA_ENABLE_PUBLIC_TENANT_BOOTSTRAP: "false"
      ALTHEA_ENABLE_ALERT_JSONL_INGESTION: "true"
      ALTHEA_ENABLE_LEGACY_INGESTION: "false"
      ALTHEA_ENABLE_IBM_AMLSIM_IMPORT: "false"
      ALTHEA_ENABLE_HUMAN_INTERPRETATION: "true"
      ALTHEA_STRICT_INGESTION_VALIDATION: "false"
      ALTHEA_ALERT_JSONL_MAX_UPLOAD_ROWS: "1000"
      ALTHEA_INGESTION_MAX_UPLOAD_BYTES: "10485760"
      ALTHEA_PRIMARY_INGESTION_MODE: "alert_jsonl"
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
